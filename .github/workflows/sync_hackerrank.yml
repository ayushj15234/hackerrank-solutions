name: Sync HackerRank Submissions

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install Dependencies
        run: pip install requests

      - name: Run Sync Script
        env:
          HR_EMAIL: ${{ secrets.HR_EMAIL }}
          HR_PASSWORD: ${{ secrets.HR_PASSWORD }}
        run: |
          python .github/scripts/fetch_and_commit.py

      - name: Commit and Push Changes
        run: |
          git config --global user.name "HackerRank Sync Bot"
          git config --global user.email "actions@github.com"
          git add .
          git diff-index --quiet HEAD || git commit -m "Automated Sync: New HackerRank Submissions"
          git push
